<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SN ARE WARRIORS</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Oswald', sans-serif;
    }

    /* Animated fire background */
    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 110%, #ff4400 0%, #a30000 30%, #1a0000 60%, #0a0a0a 100%);
      z-index: 0;
    }

    /* Ember particles */
    .embers {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    .ember {
      position: absolute;
      bottom: -10px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #ff6600;
      animation: rise linear infinite;
      opacity: 0;
    }
    @keyframes rise {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0.9; }
      50%  { opacity: 0.6; }
      100% { transform: translateY(-100vh) translateX(var(--drift)) scale(0.2); opacity: 0; }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 60px 50px 50px;
      background: rgba(10, 0, 0, 0.75);
      border: 2px solid #ff4400;
      border-radius: 4px;
      box-shadow:
        0 0 40px rgba(255, 68, 0, 0.5),
        inset 0 0 60px rgba(255, 30, 0, 0.08);
      max-width: 520px;
      width: 90vw;
      animation: cardIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Sword decoration */
    .sword-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 18px;
    }
    .sword { font-size: 1.8rem; animation: pulse-glow 2s ease-in-out infinite alternate; }
    .divider {
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff4400, transparent);
    }
    @keyframes pulse-glow {
      from { filter: drop-shadow(0 0 4px #ff6600); }
      to   { filter: drop-shadow(0 0 14px #ffaa00); }
    }

    /* Title */
    .title {
      font-family: 'Black Ops One', cursive;
      font-size: clamp(2rem, 8vw, 3.4rem);
      line-height: 1.15;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow:
        0 0 12px #ff4400,
        0 0 30px #ff4400,
        0 2px 0 #800000;
      animation: flicker 4s ease-in-out infinite;
    }
    .highlight {
      color: #ff4400;
      display: block;
    }
    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.85; }
      97% { opacity: 1; }
      98% { opacity: 0.9; }
    }

    .tagline {
      margin: 14px 0 36px;
      font-size: 0.85rem;
      letter-spacing: 6px;
      color: #ff6600;
      text-transform: uppercase;
      opacity: 0.8;
    }

    /* Download button */
    .btn {
      display: inline-block;
      padding: 18px 50px;
      background: linear-gradient(135deg, #cc2200, #ff4400);
      color: #fff;
      text-decoration: none;
      font-family: 'Black Ops One', cursive;
      font-size: 1.15rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 4px 20px rgba(255, 68, 0, 0.6),
        0 0 0 1px rgba(255,100,0,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,200,0,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 8px 30px rgba(255,68,0,0.8); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: translateY(1px) scale(0.98); }

    .btn-icon { margin-right: 10px; font-size: 1.1rem; }

    .footer-line {
      margin-top: 32px;
      font-size: 0.7rem;
      letter-spacing: 4px;
      color: #660000;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="bg"></div>

<!-- Ember particles -->
<div class="embers" id="embers"></div>

<div class="card">
  <div class="sword-row">
    <div class="divider"></div>
    <span class="sword">⚔️</span>
    <div class="divider"></div>
  </div>

  <h1 class="title">
    Download
    <span class="highlight">SN ARE WARRIORS</span>
    Here
  </h1>

  <p class="tagline">⚡ Born to Fight &nbsp;·&nbsp; Built to Win ⚡</p>

  <a
    class="btn"
    href="https://drive.google.com/file/d/1Llcfi7LOkwZQlxw-4FE64R3n1F4JoCHw/view?usp=drivesdk"
    target="_blank"
    rel="noopener noreferrer"
  >
    <span class="btn-icon">⬇</span> Download Now
  </a>

  <p class="footer-line">🔥 Warriors Never Quit 🔥</p>
</div>

<script>
  // Generate ember particles
  const container = document.getElementById('embers');
  for (let i = 0; i < 35; i++) {
    const e = document.createElement('div');
    e.className = 'ember';
    const size = Math.random() * 5 + 2;
    e.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      --drift: ${(Math.random() - 0.5) * 120}px;
      animation-duration: ${Math.random() * 4 + 3}s;
      animation-delay: ${Math.random() * 5}s;
      background: hsl(${Math.random() * 30 + 10}, 100%, ${Math.random() * 30 + 50}%);
    `;
    container.appendChild(e);
  }
</script>
</body>
</html>
